<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>口味工程师经验采集工作台 - survey-collect-v1.2.3</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.7;
      color: #333;
      background: #f5f7fa;
    }

    /* 顶部说明区 */
    .header {
      background: #fff;
      border-bottom: 1px solid #e1e4e8;
      padding: 32px 40px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: all 0.3s ease;
    }

    .header.collapsed {
      padding: 12px 40px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 16px;
      transition: all 0.3s ease;
    }

    .header.collapsed h1 {
      font-size: 18px;
      margin-bottom: 0;
    }

    .header-desc {
      color: #666;
      font-size: 14px;
      max-width: 800px;
      transition: all 0.3s ease;
    }

    .header.collapsed .header-desc {
      display: none;
    }

    .header-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-top: 20px;
      transition: all 0.3s ease;
    }

    .header.collapsed .header-info {
      display: none;
    }

    .header-progress {
      display: none;
      margin-top: 12px;
    }

    .header.collapsed .header-progress {
      display: block;
    }

    .header-progress-bar {
      height: 6px;
      background: #e8ecef;
      border-radius: 3px;
      overflow: hidden;
      max-width: 300px;
    }

    .header-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4a9eff, #0066ff);
      border-radius: 3px;
      transition: width 0.3s;
    }

    /* 自动保存状态区 */
    .auto-save-status {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 1;
      transition: opacity 0.3s;
    }

    .auto-save-status.saving {
      color: #ff9800;
    }

    .auto-save-status.saved {
      color: #4caf50;
    }

    .auto-save-icon {
      font-size: 14px;
    }

    .header-progress-text {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }

    .header-info-item {
      background: #f8f9fa;
      padding: 12px 16px;
      border-radius: 6px;
      border-left: 3px solid #4a9eff;
    }

    .header-info-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }

    .header-info-value {
      font-size: 14px;
      color: #333;
      font-weight: 500;
    }

    /* 主体布局 */
    .main-container {
      display: flex;
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
      gap: 24px;
    }

    /* 左侧导航 */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      position: sticky;
      top: 140px;
      height: fit-content;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e1e4e8;
      padding: 20px 16px;
    }

    .sidebar-title {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e1e4e8;
    }

    .nav-list {
      list-style: none;
    }

    .nav-item {
      margin-bottom: 8px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 6px;
      text-decoration: none;
      color: #555;
      font-size: 13px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .nav-link:hover {
      background: #f0f4ff;
      color: #4a9eff;
    }

    .nav-link.active {
      background: #e8f0ff;
      color: #4a9eff;
      font-weight: 500;
    }

    .nav-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .nav-status.pending {
      background: #d0d5dd;
    }

    .nav-status.progress {
      background: #ffa726;
    }

    .nav-status.completed {
      background: #4caf50;
    }

    .nav-number {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      background: #f0f4ff;
      color: #4a9eff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .nav-link.active .nav-number {
      background: #4a9eff;
      color: #fff;
    }

    /* 主填写区 */
    .content {
      flex: 1;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e1e4e8;
      padding: 32px 40px;
    }

    /* 模块样式 */
    .module {
      margin-bottom: 40px;
      scroll-margin-top: 140px;
    }

    .module:last-child {
      margin-bottom: 0;
    }

    .module-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 16px;
      border-bottom: 2px solid #e1e4e8;
      margin-bottom: 24px;
    }

    .module-number {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: #4a9eff;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .module-title {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .module-desc {
      font-size: 13px;
      color: #666;
      margin-top: 8px;
      padding-left: 44px;
    }

    /* 题目样式 */
    .question {
      margin-bottom: 28px;
      padding: 20px;
      background: #fafbfc;
      border-radius: 8px;
      border: 1px solid #eaeef2;
    }

    .question:last-child {
      margin-bottom: 0;
    }

    .question-label {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 16px;
    }

    .question-number {
      font-size: 13px;
      color: #4a9eff;
      font-weight: 600;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .question-text {
      font-size: 15px;
      font-weight: 500;
      color: #333;
      line-height: 1.6;
    }

    .required-mark {
      color: #ff4444;
      margin-left: 4px;
    }

    /* 选项样式 */
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: #fff;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .option:hover {
      border-color: #4a9eff;
      background: #f8fbff;
    }

    .option.selected {
      border-color: #4a9eff;
      background: #e8f0ff;
    }

    .option input[type="radio"],
    .option input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .option-label {
      font-size: 14px;
      color: #333;
      flex: 1;
    }

    /* 量表题样式 */
    .likert-scale {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .likert-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .likert-button {
      width: 100%;
      padding: 10px 0;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      background: #fff;
      font-size: 14px;
      font-weight: 500;
      color: #555;
      cursor: pointer;
      transition: all 0.2s;
    }

    .likert-button:hover {
      border-color: #4a9eff;
      background: #f8fbff;
    }

    .likert-button.selected {
      border-color: #4a9eff;
      background: #4a9eff;
      color: #fff;
    }

    .likert-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }

    /* 输入框样式 */
    .input-text {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }

    .input-text:focus {
      outline: none;
      border-color: #4a9eff;
      box-shadow: 0 0 0 3px rgba(74, 158, 255, 0.1);
    }

    textarea.input-text {
      min-height: 100px;
      resize: vertical;
    }

    /* 其他选项补充输入框 */
    .other-input-container {
      margin-top: 12px;
      padding: 12px 16px;
      background: #f8f9fa;
      border-radius: 6px;
      border: 1px solid #e1e4e8;
      display: none;
    }

    .other-input-container.visible {
      display: block;
    }

    .other-input-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .other-input-required {
      color: #ff4444;
      margin-left: 4px;
    }

    /* 错误高亮样式 */
    .question.error {
      border-color: #ff4444;
      background: #fff5f5;
      box-shadow: 0 0 0 2px rgba(255, 68, 68, 0.2);
    }

    .question.error .question-text {
      color: #ff4444;
    }

    .other-input-container.error {
      border-color: #ff4444;
      background: #fff5f5;
      box-shadow: 0 0 0 2px rgba(255, 68, 68, 0.2);
    }

    /* 底部操作区 */
    .footer {
      position: sticky;
      bottom: 0;
      background: #fff;
      border-top: 1px solid #e1e4e8;
      padding: 20px 40px;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
    }

    .footer-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .progress-section {
      flex: 1;
    }

    .footer-save-status {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .footer-save-status.saving {
      color: #ff9800;
    }

    .footer-save-status.saved {
      color: #4caf50;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 8px;
      background: #e8ecef;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4a9eff, #0066ff);
      border-radius: 4px;
      transition: width 0.3s;
    }

    .action-buttons {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-secondary {
      background: #f0f4ff;
      color: #4a9eff;
      border: 1px solid #4a9eff;
    }

    .btn-secondary:hover {
      background: #e0eaff;
    }

    .btn-auxiliary {
      background: #fff;
      color: #666;
      border: 1px solid #ddd;
      font-size: 13px;
      padding: 10px 16px;
    }

    .btn-auxiliary:hover {
      background: #f5f5f5;
      border-color: #ccc;
    }

    .btn-primary {
      background: #4a9eff;
      color: #fff;
    }

    .btn-primary:hover {
      background: #3a8eef;
    }

    .btn-success {
      background: #4caf50;
      color: #fff;
    }

    .btn-success:hover {
      background: #43a047;
    }

    /* 提示信息 */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #333;
      color: #fff;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.success {
      background: #4caf50;
    }

    .toast.error {
      background: #ff4444;
    }

    /* 模块完成标识 */
    .module-complete-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: #e8f5e9;
      color: #2e7d32;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
      margin-left: 12px;
    }

    /* 响应式 */
    @media (max-width: 1024px) {
      .main-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        position: static;
      }

      .header {
        padding: 24px 20px;
      }

      .content {
        padding: 24px 20px;
      }

      .footer {
        padding: 16px 20px;
      }
    }
  </style>
</head>
<body>
  <!-- 顶部说明区 -->
  <header class="header">
    <h1>口味工程师经验采集工作台</h1>
    <div class="header-desc" style="color: #666; font-size: 14px; max-width: 800px;">
      本调研用于系统梳理口味工程师在客户需求理解、菜品可交付性判断、目标出品识别、设备执行映射、试菜调优方法等方面的经验与判断逻辑，为 AI 菜谱生态建设提供知识底座。
    </div>
    <div class="header-info">
      <div class="header-info-item">
        <div class="header-info-label">面向对象</div>
        <div class="header-info-value">口味工程师 / 录菜工程师 / 一线交付人员</div>
      </div>
      <div class="header-info-item">
        <div class="header-info-label">预计时间</div>
        <div class="header-info-value">15-20 分钟（完整版）</div>
      </div>
      <div class="header-info-item">
        <div class="header-info-label">填写方式</div>
        <div class="header-info-value">选择题优先，少量简答</div>
      </div>
      <div class="header-info-item">
        <div class="header-info-label">数据用途</div>
        <div class="header-info-value">AI 菜谱生态知识底座建设</div>
      </div>
    </div>
    <div class="header-progress">
      <div class="auto-save-status saved" id="headerSaveStatus">
        <span class="auto-save-icon">✓</span>
        <span id="headerSaveStatusText">已自动保存</span>
      </div>
      <div class="header-progress-text">
        <span>填写进度</span>
        <span id="headerProgressPercent">0%</span>
      </div>
      <div class="header-progress-bar">
        <div class="header-progress-fill" id="headerProgressFill" style="width: 0%"></div>
      </div>
    </div>
  </header>

  <!-- 主体内容 -->
  <div class="main-container">
    <!-- 左侧导航 -->
    <aside class="sidebar">
      <div class="sidebar-title">调研模块导航</div>
      <ul class="nav-list" id="navList">
        <!-- 导航项由 JS 动态生成 -->
      </ul>
    </aside>

    <!-- 主填写区 -->
    <main class="content" id="content">
      <!-- 模块由 JS 动态生成 -->
    </main>
  </div>

  <!-- 底部操作区 -->
  <footer class="footer">
    <div class="footer-content">
      <div class="progress-section">
        <div class="footer-save-status saved" id="footerSaveStatus">
          <span class="auto-save-icon">✓</span>
          <span id="footerSaveStatusText">已自动保存</span>
        </div>
        <div class="progress-label">
          <span>整体进度</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
      </div>
      <div class="action-buttons">
        <button class="btn btn-auxiliary" onclick="saveDataManual()">💾 立即保存备份</button>
        <button class="btn btn-secondary" onclick="exportData()">📤 导出 JSON</button>
        <button class="btn btn-success" onclick="validateAndComplete()">✅ 完成填写并导出</button>
      </div>
    </div>
  </footer>

  <!-- 提示框 -->
  <div class="toast" id="toast"></div>

  <script>
    // ==================== 调研数据定义 ====================
    const surveyData = [
      {
        id: 'm01',
        title: '调研对象基本信息',
        desc: '了解您的基本背景和服务经验',
        questions: [
          { id: 'q1_1', type: 'text', required: true, label: '你的姓名' },
          {
            id: 'q1_2', type: 'radio', required: true, label: '当前岗位',
            options: ['口味工程师'],
            hasOther: false
          },
          {
            id: 'q1_3a', type: 'radio', required: true, label: '从事厨师相关工作的年限',
            options: ['0~1 年', '1~3 年', '3~5 年', '5~8 年', '8 年以上'],
            hasOther: false
          },
          {
            id: 'q1_3b', type: 'radio', required: true, label: '入职不停科技后从事口味/录菜相关工作的年限',
            options: ['0~1 年', '1~3 年', '3~5 年', '5~8 年', '8 年以上'],
            hasOther: false
          },
          {
            id: 'q1_4', type: 'checkbox', required: true, label: '你累计服务过的客户类型',
            options: ['连锁中餐品牌', '地方菜品牌', '快餐品牌', '团餐客户', '海外客户', '单店客户', '研发型试点客户', '其他'],
            hasOther: true
          },
          {
            id: 'q1_5', type: 'checkbox', required: true, label: '你主要熟悉的菜系',
            options: ['湘菜', '川菜', '粤菜', '江浙菜', '东北菜', '江西菜', '湖北菜', '韩餐', '日式中餐', '东南亚风味', '综合融合菜', '其他'],
            hasOther: true
          },
          {
            id: 'q1_6', type: 'checkbox', required: true, label: '你主要服务过的区域',
            options: ['华南', '华中', '华东', '华北', '西南', '西北', '港澳台', '日本', '韩国', '东南亚', '北美', '欧洲国家', '其他'],
            hasOther: true
          }
        ]
      },
      {
        id: 'm02',
        title: '客户需求获取方式',
        desc: '了解客户如何表达菜品要求',
        questions: [
          {
            id: 'q2_1', type: 'checkbox', required: true, label: '你在现场最常见到的客户需求输入方式是？',
            options: ['客户口头描述', '客户现场人工炒样菜', '客户提供文字 SOP', '客户提供配方表', '客户直接要求复刻某道已有菜', '客户只说大概口味方向', '其他'],
            hasOther: true
          },
          {
            id: 'q2_2', type: 'radio', required: true, label: '大部分客户对目标出品的表达清晰度如何？',
            options: ['非常清晰', '比较清晰', '一般', '比较模糊', '非常模糊'],
            hasOther: false
          },
          {
            id: 'q2_3', type: 'checkbox', required: true, label: '客户在试菜之后最常评价或最常提出修改的内容是什么？',
            options: ['咸淡', '辣度', '麻度', '颜色', '锅气', '香气', '嫩度', '断生程度', '汤汁多少', '挂汁状态', '外观亮泽', '分量比例', '上菜效率', '一致性', '其他'],
            hasOther: true
          },
          {
            id: 'q2_6', type: 'checkbox', required: true, label: '客户验收标准最常由谁提出？',
            options: ['厨师长', '出品负责人', '行政总厨', '研发总厨', '老板', '区域负责人', '门店店长', '多人共同决定', '不固定', '其他'],
            hasOther: true
          },
          {
            id: 'q2_7', type: 'radio', required: true, 
            label: '你认为客户对菜品要求最常见的表达方式是？（味道语言：如"咸一点、辣一点"；厨师工艺语言：如"大火快炒、小火慢炖"；外观结果语言：如"颜色红亮、汤汁浓稠"）',
            options: ['更偏"味道语言"', '更偏"厨师工艺语言"', '更偏"外观结果语言"', '三者都有', '不固定'],
            hasOther: false

// ==================== 状态管理 ====================
    let answers = {};
    let moduleStatus = {};

    // ==================== 初始化 ====================
    function init() {
      renderNav();
      renderContent();
      loadData();
      updateProgress();
      setupScrollSpy();
      setupHeaderScroll();
    }

    // ==================== 渲染导航 ====================
    function renderNav() {
      const navList = document.getElementById('navList');
      navList.innerHTML = surveyData.map((module, index) => `
        <li class="nav-item">
          <a class="nav-link" href="#${module.id}" onclick="scrollToModule('${module.id}')">
            <span class="nav-status pending" id="status-${module.id}"></span>
            <span class="nav-number">${index + 1}</span>
            <span>${module.title}</span>
          </a>
        </li>
      `).join('');
    }

    // ==================== 渲染内容 ====================
    function renderContent() {
      const content = document.getElementById('content');
      content.innerHTML = surveyData.map((module, mIndex) => `
        <section class="module" id="${module.id}">
          <div class="module-header">
            <div class="module-number">${mIndex + 1}</div>
            <div>
              <div class="module-title">${module.title}</div>
              <div class="module-desc">${module.desc}</div>
            </div>
          </div>
          ${module.questions.map((q, qIndex) => renderQuestion(q, mIndex + 1, qIndex + 1)).join('')}
        </section>
      `).join('');
    }

    // ==================== 渲染题目 ====================
    function renderQuestion(question, moduleNum, questionNum) {
      const required = question.required ? '<span class="required-mark">*</span>' : '';
      const qNum = `M${moduleNum}-${questionNum}`;

      let inputHtml = '';

      if (question.type === 'text') {
        inputHtml = `<input type="text" class="input-text" 
          oninput="saveAnswerWithDebounce('${question.id}', this.value)"
          value="${answers[question.id] || ''}">`;
      } else if (question.type === 'textarea') {
        inputHtml = `<textarea class="input-text" style="min-height:100px;resize:vertical;"
          oninput="saveAnswerWithDebounce('${question.id}', this.value)">${answers[question.id] || ''}</textarea>`;
      } else if (question.type === 'radio') {
        const hasOther = question.hasOther === true;
        const otherValue = answers[question.id + '_other'] || '';
        const isOtherSelected = answers[question.id] === '其他';
        inputHtml = `<div class="options">
          ${question.options.map(opt => {
            const checked = answers[question.id] === opt ? 'checked' : '';
            return `
              <label class="option ${checked ? 'selected' : ''}">
                <input type="radio" name="${question.id}" value="${opt}" ${checked}
                  onchange="saveAnswer('${question.id}', this.value)">
                <span class="option-label">${opt}</span>
              </label>
            `;
          }).join('')}
        </div>`;
        if (hasOther) {
          inputHtml += `
            <div class="other-input-container ${isOtherSelected ? 'visible' : ''}" id="other-container-${question.id}">
              <div class="other-input-label">请补充具体内容<span class="other-input-required">*</span></div>
              <input type="text" class="input-text" 
                placeholder="请输入其他选项的具体内容"
                oninput="saveAnswerWithDebounce('${question.id}_other', this.value)"
                value="${otherValue}">
            </div>
          `;
        }
      } else if (question.type === 'checkbox') {
        const values = Array.isArray(answers[question.id]) ? answers[question.id] : [];
        const hasOther = question.hasOther === true;
        const otherValue = answers[question.id + '_other'] || '';
        const isOtherSelected = values.includes('其他');
        inputHtml = `<div class="options">
          ${question.options.map(opt => {
            const checked = values.includes(opt) ? 'checked' : '';
            return `
              <label class="option ${checked ? 'selected' : ''}">
                <input type="checkbox" name="${question.id}" value="${opt}" ${checked}
                  onchange="saveAnswerCheckbox('${question.id}', this)">
                <span class="option-label">${opt}</span>
              </label>
            `;
          }).join('')}
        </div>`;
        if (hasOther) {
          inputHtml += `
            <div class="other-input-container ${isOtherSelected ? 'visible' : ''}" id="other-container-${question.id}">
              <div class="other-input-label">请补充具体内容<span class="other-input-required">*</span></div>
              <input type="text" class="input-text" 
                placeholder="请输入其他选项的具体内容"
                oninput="saveAnswerWithDebounce('${question.id}_other', this.value)"
                value="${otherValue}">
            </div>
          `;
        }
      } else if (question.type === 'likert') {
        inputHtml = `<div class="likert-scale">
          ${question.scale.map((label, i) => {
            const value = i + 1;
            const selected = answers[question.id] == value ? 'selected' : '';
            return `<button class="likert-button ${selected}" 
              onclick="saveLikertAnswer('${question.id}', ${value}, this)">${label}</button>`;
          }).join('')}
        </div>`;
      }

      return `
        <div class="question" id="q-${question.id}">
          <div class="question-label">
            <span class="question-number">${qNum}</span>
            <span class="question-text">${question.label}${required}</span>
          </div>
          ${inputHtml}
        </div>
      `;
    }
    // ==================== 保存答案 ====================
    function saveAnswer(questionId, value) {
      answers[questionId] = value;
      
      // 清除错误状态（用户开始填写）
      const questionEl = document.getElementById('q-' + questionId);
      if (questionEl) questionEl.classList.remove('error');
      const otherContainer = document.getElementById('other-container-' + questionId);
      if (otherContainer) otherContainer.classList.remove('error');
      
      // 处理其他选项的显示/隐藏（radio）
      const otherContainer2 = document.getElementById('other-container-' + questionId);
      if (otherContainer2) {
        if (value === '其他') {
          otherContainer2.classList.add('visible');
        } else {
          otherContainer2.classList.remove('visible');
        }
      }
      
      updateModuleStatus(questionId);
      updateProgress();
      autoSave();
    }

    function saveAnswerWithDebounce(questionId, value) {
      // 文本输入防抖保存（500ms）
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        answers[questionId] = value;
        // 清除错误状态
        const questionEl = document.getElementById('q-' + questionId);
        if (questionEl) questionEl.classList.remove('error');
        updateModuleStatus(questionId);
        updateProgress();
        autoSave();
      }, 500);
    }

    function saveAnswerCheckbox(questionId, checkbox) {
      const name = checkbox.name;
      const value = checkbox.value;
      const checked = checkbox.checked;

      // 确保 answers[name] 是数组
      if (!Array.isArray(answers[name])) {
        answers[name] = [];
      }

      if (checked) {
        if (!answers[name].includes(value)) {
          answers[name].push(value);
        }
      } else {
        answers[name] = answers[name].filter(v => v !== value);
      }

      // 更新样式
      const options = checkbox.closest('.options').querySelectorAll('.option');
      options.forEach(opt => {
        const input = opt.querySelector('input');
        if (input.checked) {
          opt.classList.add('selected');
        } else {
          opt.classList.remove('selected');
        }
      });

      // 清除错误状态（用户开始填写）
      const questionEl = document.getElementById('q-' + name);
      if (questionEl) questionEl.classList.remove('error');
      
      // 处理其他选项的显示/隐藏
      const otherContainer = document.getElementById('other-container-' + name);
      if (otherContainer) {
        if (Array.isArray(answers[name]) && answers[name].includes('其他')) {
          otherContainer.classList.add('visible');
        } else {
          otherContainer.classList.remove('visible');
        }
        // 如果 other 输入框有内容，清除错误状态
        const otherInput = otherContainer.querySelector('input');
        if (otherInput && otherInput.value.trim() !== '') {
          otherContainer.classList.remove('error');
        }
      }

      updateModuleStatus(name);
      updateProgress();
      autoSave();
    }

    function saveLikertAnswer(questionId, value, button) {
      answers[questionId] = value;

      // 更新样式
      const buttons = button.parentElement.querySelectorAll('.likert-button');
      buttons.forEach((btn, i) => {
        if (i + 1 === value) {
          btn.classList.add('selected');
        } else {
          btn.classList.remove('selected');
        }
      });

      updateModuleStatus(questionId);
      updateProgress();
      autoSave();
    }

    // ==================== 更新模块状态 ====================
    function updateModuleStatus(questionId) {
      const module = surveyData.find(m => m.questions.some(q => q.id === questionId));
      if (!module) return;

      const answeredCount = module.questions.filter(q => {
        const ans = answers[q.id];
        if (q.type === 'checkbox') {
          return ans && ans.length > 0;
        }
        return ans !== undefined && ans !== '';
      }).length;

      const totalRequired = module.questions.filter(q => q.required).length;
      const answeredRequired = module.questions.filter(q => {
        if (!q.required) return false;
        const ans = answers[q.id];
        if (q.type === 'checkbox') {
          return ans && ans.length > 0;
        }
        return ans !== undefined && ans !== '';
      }).length;

      const statusEl = document.getElementById(`status-${module.id}`);
      if (!statusEl) return;

      statusEl.className = 'nav-status';
      if (answeredRequired >= totalRequired && totalRequired > 0) {
        statusEl.classList.add('completed');
      } else if (answeredCount > 0) {
        statusEl.classList.add('progress');
      } else {
        statusEl.classList.add('pending');
      }
    }

    // ==================== 更新进度 ====================
    function updateProgress() {
      const totalRequired = surveyData.reduce((sum, m) => 
        sum + m.questions.filter(q => q.required).length, 0);

      const answeredRequired = surveyData.reduce((sum, m) => 
        sum + m.questions.filter(q => {
          if (!q.required) return false;
          const ans = answers[q.id];
          if (q.type === 'checkbox') {
            return ans && ans.length > 0;
          }
          return ans !== undefined && ans !== '';
        }).length, 0);

      const percent = totalRequired > 0 ? Math.round((answeredRequired / totalRequired) * 100) : 0;

      // 更新底部进度条
      document.getElementById('progressFill').style.width = percent + '%';
      document.getElementById('progressPercent').textContent = percent + '%';

      // 更新顶部收缩后的进度条
      const headerProgressFill = document.getElementById('headerProgressFill');
      const headerProgressPercent = document.getElementById('headerProgressPercent');
      if (headerProgressFill) {
        headerProgressFill.style.width = percent + '%';
      }
      if (headerProgressPercent) {
        headerProgressPercent.textContent = percent + '%';
      }
    }

    // ==================== 滚动监听 ====================
    function setupScrollSpy() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const moduleId = entry.target.id;
            document.querySelectorAll('.nav-link').forEach(link => {
              link.classList.remove('active');
              if (link.getAttribute('href') === `#${moduleId}`) {
                link.classList.add('active');
              }
            });
          }
        });
      }, { threshold: 0.3, rootMargin: '-100px 0px -50% 0px' });

      document.querySelectorAll('.module').forEach(module => {
        observer.observe(module);
      });
    }

    function scrollToModule(moduleId) {
      const element = document.getElementById(moduleId);
      if (element) {
        element.scrollIntoView({ behavior: 'smooth' });
      }
    }

    // ==================== 顶部说明区滚动收缩 ====================
    function setupHeaderScroll() {
      const header = document.querySelector('.header');
      let lastScrollY = window.scrollY;
      let scrollDelta = 0;
      const collapseThreshold = 100;  // 收起阈值：向下滚动超过 100px 收起
      const expandThreshold = 50;     // 展开阈值：向上滚动超过 50px 展开（滞回区间）
      const minScrollDelta = 10;      // 最小滚动距离，避免轻微抖动

      window.addEventListener('scroll', () => {
        const currentScrollY = window.scrollY;
        scrollDelta = currentScrollY - lastScrollY;
        
        // 判断滚动方向
        const isScrollingDown = scrollDelta > minScrollDelta;
        const isScrollingUp = scrollDelta < -minScrollDelta;
        
        // 向下滚动超过阈值，收起 header
        if (isScrollingDown && currentScrollY > collapseThreshold) {
          header.classList.add('collapsed');
        }
        // 向上滚动超过阈值，展开 header
        else if (isScrollingUp && currentScrollY < expandThreshold) {
          header.classList.remove('collapsed');
        }
        
        lastScrollY = currentScrollY;
      }, { passive: true });
    }

    // ==================== 本地存储 ====================
    let saveTimer = null;

    function formatTime(date) {
      const h = String(date.getHours()).padStart(2, '0');
      const m = String(date.getMinutes()).padStart(2, '0');
      const s = String(date.getSeconds()).padStart(2, '0');
      return h + ':' + m + ':' + s;
    }

    function updateSaveStatus(isSaving) {
      const now = new Date();
      const timeStr = formatTime(now);
      
      // 更新顶部状态
      const headerStatus = document.getElementById('headerSaveStatus');
      const headerStatusText = document.getElementById('headerSaveStatusText');
      if (headerStatus && headerStatusText) {
        if (isSaving) {
          headerStatus.className = 'auto-save-status saving';
          headerStatusText.textContent = '保存中...';
        } else {
          headerStatus.className = 'auto-save-status saved';
          headerStatusText.textContent = '已自动保存 ' + timeStr;
        }
      }
      
      // 更新底部状态
      const footerStatus = document.getElementById('footerSaveStatus');
      const footerStatusText = document.getElementById('footerSaveStatusText');
      if (footerStatus && footerStatusText) {
        if (isSaving) {
          footerStatus.className = 'footer-save-status saving';
          footerStatusText.textContent = '保存中...';
        } else {
          footerStatus.className = 'footer-save-status saved';
          footerStatusText.textContent = '已自动保存 ' + timeStr;
        }
      }
    }

    function autoSave() {
      updateSaveStatus(true);
      localStorage.setItem('survey-collect-answers', JSON.stringify(answers));
      localStorage.setItem('survey-collect-timestamp', new Date().toISOString());
      // 短暂延迟后更新为已保存状态，让用户感知到保存动作
      setTimeout(() => {
        updateSaveStatus(false);
      }, 300);
    }

    function saveDataManual() {
      // 手动保存备份（辅助安心用）
      localStorage.setItem('survey-collect-answers', JSON.stringify(answers));
      localStorage.setItem('survey-collect-timestamp', new Date().toISOString());
      updateSaveStatus(false);
      // 短暂高亮提示
      const headerStatus = document.getElementById('headerSaveStatus');
      if (headerStatus) {
        headerStatus.style.opacity = '0.5';
        setTimeout(() => {
          headerStatus.style.opacity = '1';
        }, 200);
      }
      showToast('备份已保存', 'success');
    }

    function saveData() {
      // 兼容旧调用，实际使用 saveDataManual
      saveDataManual();
    }

    function loadData() {
      const saved = localStorage.getItem('survey-collect-answers');
      if (saved) {
        try {
          answers = JSON.parse(saved);
          // 恢复答案到界面
          Object.keys(answers).forEach(questionId => {
            // 跳过 _other 后缀的字段，这些会在恢复主字段时处理
            if (questionId.endsWith('_other')) return;
            
            const value = answers[questionId];
            const question = surveyData.flatMap(m => m.questions).find(q => q.id === questionId);
            if (!question) return;

            if (question.type === 'checkbox') {
              // 确保 value 是数组，防止旧数据格式问题
              const arrValue = Array.isArray(value) ? value : [];
              answers[questionId] = arrValue; // 修正 localStorage 中的脏数据
              const inputs = document.querySelectorAll(`input[name="${questionId}"]`);
              inputs.forEach(input => {
                if (arrValue.includes(input.value)) {
                  input.checked = true;
                  input.parentElement.classList.add('selected');
                }
              });
              // 恢复其他选项输入框
              const otherContainer = document.getElementById('other-container-' + questionId);
              if (otherContainer && arrValue.includes('其他')) {
                otherContainer.classList.add('visible');
                const otherInput = otherContainer.querySelector('input');
                if (otherInput && answers[questionId + '_other']) {
                  otherInput.value = answers[questionId + '_other'];
                }
              }
            } else if (question.type === 'radio') {
              const input = document.querySelector(`input[name="${questionId}"][value="${value}"]`);
              if (input) {
                input.checked = true;
                input.parentElement.classList.add('selected');
              }
              // 恢复其他选项输入框
              const otherContainer = document.getElementById('other-container-' + questionId);
              if (otherContainer && value === '其他') {
                otherContainer.classList.add('visible');
                const otherInput = otherContainer.querySelector('input');
                if (otherInput && answers[questionId + '_other']) {
                  otherInput.value = answers[questionId + '_other'];
                }
              }
            } else if (question.type === 'likert') {
              const buttons = document.querySelectorAll(`#${questionId} .likert-button`);
              buttons.forEach((btn, i) => {
                if (i + 1 === value) {
                  btn.classList.add('selected');
                }
              });
            } else if (question.type === 'text') {
              const input = document.querySelector(`input[oninput*="${questionId}"]`);
              if (input) {
                input.value = value;
              }
            } else if (question.type === 'textarea') {
              const textarea = document.querySelector(`textarea[oninput*="${questionId}"]`);
              if (textarea) {
                textarea.value = value;
              }
            }

            updateModuleStatus(questionId);
          });
        } catch (e) {
          console.error('加载保存数据失败:', e);
        }
      }
    }    // ==================== 导出 ====================
    function exportData() {
      const name = answers['q1_1'] || '未命名';
      const timestamp = new Date().toISOString().slice(0, 10).replace(/-/g, '');

      const exportData = {
        surveyVersion: 'survey-collect-v1.1',
        exportTime: new Date().toISOString(),
        respondent: {
          name: answers['q1_1'] || '',
          position: answers['q1_2'] || '',
          experience: answers['q1_3'] || ''
        },
        answers: answers
      };

      const json = JSON.stringify(exportData, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `taste-survey-${name}-${timestamp}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      showToast('导出成功', 'success');
    }

    // ==================== 完成填写并导出 ====================
    function validateAndComplete() {
      try {
        // 先清除所有错误状态
        document.querySelectorAll('.question.error').forEach(el => el.classList.remove('error'));
        document.querySelectorAll('.other-input-container.error').forEach(el => el.classList.remove('error'));

        const missingRequired = [];
        const missingOther = [];
        let firstMissingQuestionId = null;
        let firstMissingOtherId = null;

        surveyData.forEach(module => {
          module.questions.forEach(q => {
            if (!q.required) return;
            const ans = answers[q.id];
            if (q.type === 'checkbox') {
              // checkbox 答案应该是数组
              if (!ans || !Array.isArray(ans) || ans.length === 0) {
                missingRequired.push(`${module.title}: ${q.label}`);
                if (!firstMissingQuestionId) firstMissingQuestionId = q.id;
              } else if (q.hasOther && Array.isArray(ans) && ans.includes('其他')) {
                const otherValue = answers[q.id + '_other'];
                if (!otherValue || otherValue.trim() === '') {
                  missingOther.push(`${module.title}: ${q.label} 的"其他"选项需要补充具体内容`);
                  if (!firstMissingOtherId) firstMissingOtherId = q.id;
                }
              }
            } else if (q.type === 'radio') {
              // radio 答案应该是字符串
              if (!ans || ans === '') {
                missingRequired.push(`${module.title}: ${q.label}`);
                if (!firstMissingQuestionId) firstMissingQuestionId = q.id;
              } else if (q.hasOther && ans === '其他') {
                const otherValue = answers[q.id + '_other'];
                if (!otherValue || otherValue.trim() === '') {
                  missingOther.push(`${module.title}: ${q.label} 的"其他"选项需要补充具体内容`);
                  if (!firstMissingOtherId) firstMissingOtherId = q.id;
                }
              }
            } else if (!ans || ans === '') {
              missingRequired.push(`${module.title}: ${q.label}`);
              if (!firstMissingQuestionId) firstMissingQuestionId = q.id;
            }
          });
        });

        // 优先处理 other 补充输入框未填的情况
        if (missingOther.length > 0) {
          showToast(missingOther[0], 'error');
          if (firstMissingOtherId) {
            const otherContainer = document.getElementById('other-container-' + firstMissingOtherId);
            if (otherContainer) {
              otherContainer.classList.add('visible');
              otherContainer.classList.add('error');
              setTimeout(() => {
                otherContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
                const otherInput = otherContainer.querySelector('input');
                if (otherInput) otherInput.focus();
              }, 100);
            }
          }
          return;
        }

        if (missingRequired.length > 0) {
          showToast(`还有 ${missingRequired.length} 个必填项未完成`, 'error');
          if (firstMissingQuestionId) {
            const questionEl = document.getElementById('q-' + firstMissingQuestionId);
            if (questionEl) {
              questionEl.classList.add('error');
              setTimeout(() => {
                questionEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                const firstInput = questionEl.querySelector('input');
                if (firstInput) firstInput.focus();
              }, 100);
            }
          }
          return;
        }

        // 校验通过，直接导出
        exportDataWithComplete();
      } catch (e) {
        console.error('validateAndComplete error:', e);
        showToast('校验过程出错：' + e.message, 'error');
      }
    }    function exportDataWithComplete() {
      // 先保存一次
      autoSave();
      
      // 执行导出
      const name = answers['q1_1'] || '未命名';
      const timestamp = new Date().toISOString().slice(0, 10).replace(/-/g, '');

      const exportObj = {
        surveyVersion: 'survey-collect-v1.2.3',
        exportTime: new Date().toISOString(),
        respondent: {
          name: answers['q1_1'] || '',
          position: answers['q1_2'] || '',
          experienceYears: answers['q1_3a'] || '',
          companyYears: answers['q1_3b'] || ''
        },
        answers: answers
      };

      const json = JSON.stringify(exportObj, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `taste-survey-${name}-${timestamp}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      // 导出完成后提示
      showToast('✓ 文件已导出！请将文件发送给指定负责人', 'success');
    }    // ==================== 提示框 ====================
    function showToast(message, type = '') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type + ' show';
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // ==================== 启动 ====================
    init();
  </script>
</body>
